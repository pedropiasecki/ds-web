<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Shadow</title>
    <style>
        div {
            background-color: orange;
            width: 200px;
            height: 200px;
            margin: 100px auto;
            box-shadow: 10px -10px 5px black, 10px 10px 5px red;
            /*deslocamento horizontal - deslocamento vertical - desfoque - cor*/
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
