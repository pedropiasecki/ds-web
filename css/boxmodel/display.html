<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Display</title>
    <style>
        h1, p {
            border: 1px solid black;
            display: inline;
        }
        b {
            background-color: yellow;
            margin-left: 20px;
            padding-top: 30px;
            display: inline;
        }
    </style>
</head>
<body>
    <h1>Display</h1>
    <p>Posicionando <b>Novos</b> Elementos</p>
</body>
</html>
