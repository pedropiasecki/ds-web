<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Função Calc</title>
    <style>
        :root {
            --header-height: 15rem;
        }
        html {
            font-size: 62.5%;
        }
        header {
            width: 100%;
            background-color: rgba(255, 0, 0, .3);
            height: var(--header-height);
            font-size: 2rem;
            position: fixed;
            top: 0;
            left: 0;
        }
        main {
            min-height: calc(100vh - var(--header-height));
            background-color: #ccc;
            font-size: 2rem;
            margin-top: 15rem;
        }
        footer {
            height: 10rem;
            font-size: 2rem;
            background-color: #0000ff;
        }

    </style>
</head>
<body>
    <header>Header</header>
    <main>Main</main>
    <footer>Footer</footer>
</body>
</html>
