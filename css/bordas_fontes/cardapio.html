<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio</title>
    <style>
        body {
            font-family: sans-serif;
        }
        table {
            width: 80%;
            margin: auto;
            background-color: beige;
            border-collapse: collapse;
        }
        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            margin-top: 10px;
        }
        th {
            background-color: darkkhaki;
            border: 2px solid darkgoldenrod;
            padding: 16px;
        }
        td {
            text-align: center;
            border: 2px solid darkgoldenrod;
            padding: 10px;
        }
    </style>
</head>
<body>
    <table>
        <caption>Tabela de Preços</caption>
        <thead>
            <tr>
                <th>Tipo</th>
                <th>Item</th>
                <th>Valor   </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="3">Alimento</td>
                <td>Hamburguer</td>
                <td>R$: 25,00</td>
            </tr>
            <tr>
                <td>Cachorro Quente</td>
                <td>R$: 20,00</td>
            </tr>
            <tr>
                <td>Alpaca Frita</td>
                <td>R$: 30,00</td>
            </tr>
            <tr>
                <td rowspan="4">Bebida</td>
                <td>Água</td>
                <td>R$: 5,00</td>
            </tr>
            <tr>
                <td>Suco</td>
                <td>R$: 6,00</td>
            </tr>
            <tr>
                <td>Refrigerante</td>
                <td>R$: 10,00</td>
            </tr>
            <tr>
                <td>Cerveja</td>
                <td>R$: 8,00</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">Valores sujeitos à alteração</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
