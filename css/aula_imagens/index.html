<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trabalhando com imagens</title>
    <style>
        img {
            width: 500px;
        }
    </style>
</head>
<body>
    <h1>Trabalho com Imagens</h1>
    <h2>Imagem Bitmap</h2>
    <img src="imagens/logo-sem-fundo.png" alt="imagem do logo sem fundo em formato png">
    <h2>Imagem Vetorial</h2>
    <img src="imagens/logo-sem-fundo.svg" alt="imagem do logo sem fundo em formato svg">
    <h2>Imagem Bitmap de GIF animado</h2>
    <img src="imagens/gif-animado.gif" alt="imagem com um gif animado do Simpsons correndo">
</body>
</html>
