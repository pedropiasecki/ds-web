<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fontes</title>
    <style>
      @font-face {
        font-family: nadia;
        src: url(nadia/nadia-serif.ttf);
      }
      @font-face {
        font-family: astrombo;
        src: url(nadia/astronbo.ttf);
      }

      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+Meroitic&display=swap");

      p {
        font-family: astrombo;
      }
      h1 {
        font-family: nadia, "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
    </style>
  </head>
