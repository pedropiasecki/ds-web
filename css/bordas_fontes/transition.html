<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
        div {
            background-color: yellow;
            width: 150px;
            height: 150px;
            margin: 100px auto;
        }

        div:hover {
            width: 400px;
            transition-property: width;
            transition-duration: 1s;
            transition-timing-function: ease-out;
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
