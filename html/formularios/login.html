<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        html {
            background-color: #95a5a6;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        form {
            width: 35vw;
            background-color: #ecf0f1;
            border-radius: 5px;
            box-shadow: 3px 3px 10px #333;
        }
        input, label {
            display: block;
            width: 100%;
            box-sizing: border-box;
        }
        label {
            margin-bottom: .25em;
        }
        input {
            padding: .75em;
            border-radius: 5px;
            border: 1px solid #bbb;
            margin-bottom: 1.5em;
            font-size: 1em;
        }
        fieldset {
            border: none;
        }
        legend {
            padding: 1em;
            text-align: center;
            font-weight: bold;
            color: #454e4f;
            font-size: 1,2em;
        }
        .actions {
            display: flex;
            gap: 1em;
        }
        .btn {
            background-color: #95a5a6;
            color: #ffffff;
            cursor: pointer;
        }
        .btn2 {
            background-color: #FA8072;
            color: #ffffff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Login</h1>
    <form action="#" method="get"> <!--deve ser post-->
        <fieldset>
            <legend>Insira os seus dados</legend>
            <label for="user">Usuário</label>
            <input type="text" id="user" required autofocus/>
            <label for="pass">Senha</label>
            <input type="password" id="pass"/>
            <div class="actions">
                <input type="reset" value="Apagar" class="btn2"/>
                <input type="submit" value="Entrar" class="btn"/>
            </div>
        </fieldset>
    </form>
</body>
</html>
